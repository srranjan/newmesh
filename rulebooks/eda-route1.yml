apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: eda-webhook-route
  namespace: ansible-automation-platform
spec:
  to:
    kind: Service
    # Output from oc get svc -n ansible-automation-platform | grep activation used below
    name: <<activation-6-eda-logic-router>>  # ← Use the actual Service name from Step 1
    weight: 100
  port:
    targetPort: 5000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
#Usage
# oc apply -f eda-route1.yml
# oc get route eda-webhook-route -n ansible-automation-platform
# USe the output in your curl or in your webhook configuration
